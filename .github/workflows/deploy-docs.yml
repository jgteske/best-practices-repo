name: Deploy Docs to GitHub Pages

# Build the VitePress site and publish it to GitHub Pages.
on:
  # Deploy whenever the docs or examples change on the default branch.
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-docs.yml"
  # Allow running it by hand from the Actions tab.
  workflow_dispatch:

# GITHUB_TOKEN permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run supersede an in-progress one, but never cancel a run
# that is midway through publishing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # VitePress "last updated" timestamps read git history.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check examples
        run: npm run typecheck

      - name: Build site
        run: npm run docs:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
